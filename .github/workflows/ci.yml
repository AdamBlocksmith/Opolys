name: CI

on:
  push:
  pull_request:

env:
  CARGO_TERM_COLOR: always

jobs:
  linux:
    name: Linux full gate
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: 1.95.0
          components: rustfmt, clippy

      - name: Cache Rust builds
        uses: Swatinem/rust-cache@v2

      - name: Check formatting
        run: cargo fmt --check

      - name: Run clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: Run tests
        run: cargo test --workspace

      - name: Run EVO-OMAP tests
        run: |
          cargo test --manifest-path vendor/evo-omap/Cargo.toml test_known_answer --lib
          cargo test --manifest-path vendor/evo-omap/Cargo.toml test_memory_merkle --lib
          cargo test --manifest-path vendor/evo-omap/Cargo.toml compute_epoch_seed_with_epoch_length --lib

      - name: Install dependency security tools
        run: |
          cargo install cargo-audit --locked
          cargo install cargo-deny --locked

      - name: Run dependency security checks
        run: |
          cargo audit --ignore RUSTSEC-2026-0118 --ignore RUSTSEC-2026-0119
          cargo deny check advisories
          cd vendor/evo-omap
          cargo audit
          cargo deny check advisories

  cross-platform:
    name: Cross-platform deterministic checks (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [windows-2025-vs2026, macos-latest]

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: 1.95.0

      - name: Cache Rust builds
        uses: Swatinem/rust-cache@v2

      - name: Run consensus tests
        run: cargo test -p opolys-consensus

      - name: Run crypto tests
        run: cargo test -p opolys-crypto

      - name: Run execution tests
        run: cargo test -p opolys-execution

      - name: Run wallet tests
        run: cargo test -p opolys-wallet

      - name: Run EVO-OMAP deterministic tests
        run: |
          cargo test --manifest-path vendor/evo-omap/Cargo.toml test_known_answer --lib
          cargo test --manifest-path vendor/evo-omap/Cargo.toml test_memory_merkle --lib
          cargo test --manifest-path vendor/evo-omap/Cargo.toml compute_epoch_seed_with_epoch_length --lib
